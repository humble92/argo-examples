{{- /* Attach to edge Gateway eg in default (see gitops/infrastructure/envoy-edge). */ -}}
{{- /* Add "127.0.0.1 openclaw.local" to hosts, or change hostnames to your real DNS name. */ -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  parentRefs:
    - name: eg
      namespace: default
      kind: Gateway
      sectionName: http
  hostnames:
    - openclaw.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}
          port: 18789
