# Attach to edge Gateway `eg` in `default` (see gitops/argocd/infrastructure/envoy-edge).
# Add "127.0.0.1 n8n.local" to hosts, or change hostnames to your real DNS name.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n-prod
spec:
  parentRefs:
    - name: eg
      namespace: default
      kind: Gateway
      sectionName: http
  hostnames:
    - n8n.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: n8n
          port: 80
