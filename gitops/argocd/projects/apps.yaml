apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: Application workloads; Namespace CRs allowed when the manifest namespace matches destinations
  sourceRepos:
    - https://github.com/humble92/argo-examples.git
    - https://github.com/devopsjourney1/argo-examples.git
  destinations:
    - namespace: prod
      server: https://kubernetes.default.svc
    - namespace: dev
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: n8n-prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    # e.g. gitops/applications/n8n-prod/namespace.yaml (Argo CD still enforces destination namespace allow-list)
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  # Bootstrap Secret n8n-prod-secrets is created out-of-band (see README); not in Git.
  orphanedResources:
    warn: true
    ignore:
      - group: ""
        kind: Secret
        name: n8n-prod-secrets
