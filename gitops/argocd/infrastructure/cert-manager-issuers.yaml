# ACME ClusterIssuers (depends on cert-manager + edge Gateway).
# Set ACME_EMAIL_PLACEHOLDER in clusterissuers.yaml before syncing.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/humble92/argo-examples.git
    targetRevision: master
    path: gitops/argocd/infrastructure/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
