# Gateway API (standard channel) + Envoy Gateway CRDs.
# Pin targetRevision to the same major line as envoy-gateway (see compatibility matrix).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
spec:
  project: infrastructure
  source:
    repoURL: oci://docker.io/envoyproxy/gateway-crds-helm
    chart: gateway-crds-helm
    targetRevision: v1.7.1
    helm:
      releaseName: envoy-gateway-crds
      values: |
        crds:
          gatewayAPI:
            enabled: true
            channel: standard
          envoyGateway:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
