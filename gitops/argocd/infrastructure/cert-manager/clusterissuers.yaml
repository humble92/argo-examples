# Let's Encrypt ClusterIssuers using Gateway API HTTP-01.
# Replace ACME_EMAIL_PLACEHOLDER before syncing (or use a private overlay).
# parentRefs must match the Gateway defined in ../envoy-edge/gateway.yaml.
# Docs: https://cert-manager.io/docs/configuration/acme/http01/
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: daniel.hwang@motioncorrect.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: eg
                namespace: default
                kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: daniel.hwang@motioncorrect.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: eg
                namespace: default
                kind: Gateway
