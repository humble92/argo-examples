# Edge GatewayClass + Gateway (replaces upstream quickstart edge objects).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-edge
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/humble92/argo-examples.git
    targetRevision: master
    path: gitops/argocd/infrastructure/envoy-edge
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
