# ClusterIssuers apply after cert-manager Helm in the same Application (sync-wave "10").
# Replace ACME_EMAIL_PLACEHOLDER before syncing (or use a private overlay).
# parentRefs must match the Gateway in envoy-edge/gateway.yaml (envoy-edge should sync before or in parallel; issuance needs that Gateway at runtime).
# Docs: https://cert-manager.io/docs/configuration/acme/http01/
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  acme:
    email: daniel.hwang@motioncorrect.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: eg
                namespace: default
                kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  acme:
    email: daniel.hwang@motioncorrect.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: eg
                namespace: default
                kind: Gateway
